<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I LOVE YOU RASHIEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1531366936337-7c912a4589a7') center/cover no-repeat fixed;
            overflow: hidden;
            position: relative;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        /* NO DARK OVERLAY — pure aesthetic sunset only */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            color: #3788b8;
            text-shadow:
                8px 8px 0 #3511ab,
                0 0 30px rgba(53, 10, 172, 0.95),
                0 0 70px rgba(14, 44, 215, 0.8),
                0 0 100px rgba(12, 153, 224, 0.6);
            z-index: 2;
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: -2px;
        }
        /* Aesthetic BLUE Heart Buttons */
        .hearts-container {
            display: flex;
            gap: 50px;
            z-index: 2;
        }
        .heart-btn {
            font-size: 4.5rem;
            background: transparent;
            border: none;
            color: #3788b8;
            cursor: pointer;
            transition: all 0.4s ease;
            text-shadow:
                0 0 15px #1386e3,
                0 0 30px #0d11dc;
            filter: drop-shadow(0 10px 15px rgba(20, 100, 220, 0.6));
            padding: 10px;
            animation: heartPulse 2s ease-in-out infinite;
            text-decoration: none;
            display: inline-block;
        }
        .heart-btn:hover {
            transform: scale(1.3) rotate(12deg);
            color: #1e90ff;
            text-shadow:
                0 0 25px #1386e3,
                0 0 45px #0d11dc;
        }
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .heart-btn:nth-child(2) { animation-delay: 0.4s; }
        .heart-btn:nth-child(3) { animation-delay: 0.8s; }
    </style>
</head>
<body>
    <h1 class="title">RASHIEL ABNO</h1>
    <!-- 3 Aesthetic Blue Heart Buttons -->
    <div class="hearts-container">
        <a href="tulips.html" class="heart-btn">❤️</a>
        <a href="photos.html" class="heart-btn">❤️</a>
        <a href="envelop.html" class="heart-btn">❤️</a>
    </div>
</body>
</html>
