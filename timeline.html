<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rashiel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            background: url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat fixed;
            overflow: hidden;
            position: relative;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Dark overlay for readability */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
            pointer-events: none;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            color: #E65100;
            text-shadow: 8px 8px 0 #FF9800;
            z-index: 2;
            text-align: center;
            margin-bottom: 60px;
        }

        /* Aesthetic Red Heart Buttons */
        .hearts-container {
            display: flex;
            gap: 50px;
            z-index: 2;
        }

        .heart-btn {
            font-size: 4.5rem;
            background: transparent;
            border: none;
            color: #ff3333;
            cursor: pointer;
            transition: all 0.4s ease;
            text-shadow: 
                0 0 15px #ff3333,
                0 0 30px #ff6666;
            filter: drop-shadow(0 10px 15px rgba(255, 51, 51, 0.5));
            padding: 10px;
            animation: heartPulse 2s ease-in-out infinite;
            text-decoration: none;
            display: inline-block;
        }

        .heart-btn:hover {
            transform: scale(1.3) rotate(12deg);
            color: #ff0000;
            text-shadow: 
                0 0 25px #ff0000,
                0 0 45px #ff5555;
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .heart-btn:nth-child(2) { animation-delay: 0.4s; }
        .heart-btn:nth-child(3) { animation-delay: 0.8s; }
    </style>
</head>
<body>

    <h1 class="title">welcome to rashiel's world</h1>

    <!-- 3 Aesthetic Red Heart Buttons -->
    <!-- LEFT HEART now opens the tulips animation -->
    <div class="hearts-container">
        <a href="tulips.html" class="heart-btn">❤️</a>
        <a href="photos.html" class="heart-btn">❤️</a>
        <button class="heart-btn">❤️</button>
        <button class="heart-btn">❤️</button>
    </div>

</body>
</html>
