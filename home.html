<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rashiel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #FFF59D, #FFEE58, #FFCC00);
            overflow: hidden;
            position: relative;
            font-family: 'Poppins', sans-serif;
        }

        /* Minimalist subtle dot pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 0);
            background-size: 50px 50px;
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }

        .title-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 7rem;
            font-weight: 700;
            color: #E65100;
            letter-spacing: -6px;
            padding: 20px 60px;
            background: rgba(255, 255, 255, 0.25);
            border: 6px solid #E65100;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 
                0 15px 35px rgba(230, 81, 0, 0.3),
                8px 8px 0 #FF9800;
            z-index: 10;
            transition: all 0.4s ease;
            cursor: pointer;
            white-space: nowrap;
            display: inline-block;
        }

        .title-button:hover {
            transform: translate(-50%, -50%) scale(1.08);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 45px rgba(230, 81, 0, 0.4);
        }

        .gif {
            position: absolute;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            z-index: 5;
            animation: floatAround 13s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(55px, -65px) rotate(18deg); }
            50% { transform: translate(-45px, 55px) rotate(-15deg); }
            75% { transform: translate(40px, -45px) rotate(10deg); }
        }

        .small { width: 130px; }
        .medium { width: 170px; }
        .large { width: 215px; }
    </style>
</head>
<body>
