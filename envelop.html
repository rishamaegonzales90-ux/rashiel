<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I LOVE YOU RASHEL</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #6eb5ff, #a8d8ff, #f0f9ff);
      overflow: hidden;
    }

    .envelope{
      position:relative;
      width:340px;
      height:230px;
      background:#3b9ff0;
      cursor:pointer;
      transition:all 0.4s ease;
      border-radius:14px;
      box-shadow:0 20px 35px rgba(59, 159, 240, 0.35);
    }

    .envelope:hover{
      transform: translateY(-10px) scale(1.05);
      box-shadow:0 25px 45px rgba(59, 159, 240, 0.45);
    }

    /* Top flap */
    .envelope::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      width:0;
      height:0;
      border-left:170px solid transparent;
      border-right:170px solid transparent;
      border-top:115px solid #2a8ad9;
      z-index:2;
    }

    /* Centered Rose */
    .rose{
      position:absolute;
      top: 37%;
      left:50%;
      transform:translate(-50%, -50%);
      font-size: 82px;
      z-index:4;
      animation: roseFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.3));
      pointer-events: none;
    }

    @keyframes roseFloat {
      0%, 100% { transform: translate(-50%, -50%) rotate(-6deg); }
      50%      { transform: translate(-50%, -50%) rotate(8deg); }
    }

    .open-text{
      position:absolute;
      top: 73%;
      left:50%;
      transform:translate(-50%, -50%);
      font-size:17px;
      color:white;
      font-weight:700;
      z-index:3;
      letter-spacing:3px;
      white-space:nowrap;
      background:rgba(255,255,255,0.25);
      padding:9px 28px;
      border-radius:50px;
      border:2px solid rgba(255,255,255,0.4);
      backdrop-filter:blur(10px);
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      transition:all 0.3s ease;
    }

    .envelope:hover .open-text{
      background:rgba(255,255,255,0.35);
      transform:translate(-50%, -50%) scale(1.08);
    }
  </style>
</head>
<body>
  <div class="envelope" onclick="openLetter()">
    <!-- Beautiful centered rose -->
    <div class="rose">🌹</div>
    <div class="open-text">open it bb</div>
  </div>

  <script>
    function openLetter(){
      window.location.href = "letter.html";
    }
  </script>
</body>
</html>
