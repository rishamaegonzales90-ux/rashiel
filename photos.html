<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I LOVE YOU RASHEL</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <audio id="bg-music" loop autoplay>
    <source src="https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/The%20Ridleys%20-%20Love%20Is%20(Lyric%20Video).mp3" type="audio/mpeg">
  </audio>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    const PHRASES = [
      "Palangga taka", "I love you", "Gihigugma tika", "Mahal kita",
      "Te amo", "Je t'aime", "Saranghae",
      "Kaluguran daka", "Ay ayaten ka", "Namumutan taka",
      "Inaru taka",
    ];

    const IMAGE_SOURCES = [
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/1d24b0d1-750f-4c73-a767-a5a47505148e.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/723672a2-b44d-4252-8c63-7c7b13b41917.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/7add0a75-d812-4ee6-bcdb-ea3939886c96.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/84a59099-5801-4fe3-bf44-e3d379f47d6c.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/a078e621-d9fa-4443-ba84-526b06010efe.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/ad893d0f-dfa0-4502-b748-1fdd6144288f.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/fed339f7-76ad-4813-99d0-31d77f71c139.jpg",
      "https://github.com/rishamaegonzales90-ux/rashiel/raw/refs/heads/main/fee57a87-a4aa-435e-b120-b25ac76eadde.jpg"
    ];

    const loadedImages = IMAGE_SOURCES.map(src => {
      const image = new Image();
      image.src = src;
      return image;
    });

    const texts = [];
    const stars = [];
    const hearts = [];
    const floatingImages = [];

    const MAX_ACTIVE_TEXTS = 7;
    const MAX_ACTIVE_IMAGES = 3;
    const SPAWN_INTERVAL = 1500;
    const IMAGE_SPAWN_INTERVAL = 2600;
    let phraseIndex = 0;
    let offsetX = 0, offsetY = 0, zoom = 1;

    function createStar() { return { x: Math.random() * w, y: Math.random() * h, z: Math.random() * 2000, speed: 1 + Math.random() }; }
    function createHeart() { return { x: Math.random() * w, y: Math.random() * h, z: Math.random() * 1600 + 400, speed: 1.4 + Math.random() }; }

    function spawnTextInOrder(){
      if (texts.length >= MAX_ACTIVE_TEXTS) return;
      const phrase = PHRASES[phraseIndex % PHRASES.length];
      phraseIndex++;
      texts.push({ text: phrase, x: Math.random() * w, y: Math.random() * h, z: Math.random() * 1600 + 300, speed: 1.8 + Math.random() * 1.2, baseFont: (w < 600 ? 40 : 60), glow: 25 });
    }

    function spawnImage() {
      if (floatingImages.length >= MAX_ACTIVE_IMAGES) return;
      const imageIndex = Math.floor(Math.random() * loadedImages.length);
      floatingImages.push({
        image: loadedImages[imageIndex],
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 300,
        speed: 1.3 + Math.random() * 0.9,
        size: w < 600 ? 150 : 220
      });
    }

    for (let i = 0; i < 400; i++) stars.push(createStar());
    for (let i = 0; i < 80; i++) hearts.push(createHeart());

    function animate() {
      ctx.clearRect(0, 0, w, h);

      // stars
      stars.forEach(s => {
        s.z -= s.speed;
        if (s.z <= 0) { s.x = Math.random() * w; s.y = Math.random() * h; s.z = 2000; }
        const scale = 300 / s.z * zoom;
        const x = (s.x - w/2 + offsetX) * scale + w/2;
        const y = (s.y - h/2 + offsetY) * scale + h/2;
        ctx.fillStyle = "white";
        ctx.fillRect(x, y, scale*1.5, scale*1.5);
      });

      // texts
      texts.forEach((t, i) => {
        t.z -= t.speed;
        if (t.z <= 0) { texts.splice(i,1); return; }
        const scale = 250 / t.z * zoom;
        const x = (t.x - w/2 + offsetX) * scale + w/2;
        const y = (t.y - h/2 + offsetY) * scale + h/2;
        ctx.save();
        ctx.translate(x, y); ctx.scale(scale, scale);
        ctx.font = `bold ${t.baseFont}px Arial`;
        ctx.fillStyle = "white";
        ctx.shadowColor = "white"; ctx.shadowBlur = t.glow;
        ctx.textAlign = "center";
        ctx.fillText(t.text, 0, 0);
        ctx.restore();
      });

      // HEARTS - NOW BLUE WITH BRIGHT GLOW 💙
      hearts.forEach(c => {
        c.z -= c.speed;
        if (c.z <= 0) { 
          c.x = Math.random() * w; 
          c.y = Math.random() * h; 
          c.z = 2000; 
        }
        const scale = 220 / c.z * zoom;
        const x = (c.x - w/2 + offsetX) * scale + w/2;
        const y = (c.y - h/2 + offsetY) * scale + h/2;
        ctx.save();
        ctx.translate(x, y); 
        ctx.scale(scale*2.2, scale*2.2);

        // Blue glow & color
        ctx.shadowColor = "#66ccff";       // bright blue glow
        ctx.shadowBlur = 45;               // strong glowing effect
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        ctx.font = "bold 28px Arial";
        ctx.fillStyle = "#4da6ff";         // beautiful blue heart
        ctx.textAlign = "center";
        ctx.fillText("❤", 0, 0);
        ctx.restore();
      });

      // floating images
      floatingImages.forEach((item, i) => {
        item.z -= item.speed;
        if (item.z <= 0) { floatingImages.splice(i, 1); return; }
        const scale = 240 / item.z * zoom;
        const x = (item.x - w/2 + offsetX) * scale + w/2;
        const y = (item.y - h/2 + offsetY) * scale + h/2;
        const image = item.image;
        if (!image.complete || !image.naturalWidth) return;
        const drawSize = item.size * scale;
        ctx.save();
        ctx.translate(x, y);
        ctx.shadowColor = "rgba(255, 80, 120, 0.55)";
        ctx.shadowBlur = 24;
        ctx.drawImage(image, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
        ctx.restore();
      });

      requestAnimationFrame(animate);
    }

    animate();
    setInterval(spawnTextInOrder, SPAWN_INTERVAL);
    setInterval(spawnImage, IMAGE_SPAWN_INTERVAL);

    const activePointers = new Map();
    let lastDragX = 0, lastDragY = 0, lastPinchDistance = 0;

    function updatePinchZoom() {
      if (activePointers.size !== 2) return;
      const points = [...activePointers.values()];
      const dx = points[0].x - points[1].x;
      const dy = points[0].y - points[1].y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (lastPinchDistance) {
        zoom *= distance / lastPinchDistance;
        zoom = Math.min(Math.max(0.5, zoom), 3);
      }
      lastPinchDistance = distance;
    }

    canvas.addEventListener("pointerdown", e => {
      canvas.setPointerCapture(e.pointerId);
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (activePointers.size === 1) {
        lastDragX = e.clientX; lastDragY = e.clientY;
      }
      updatePinchZoom();
    });

    canvas.addEventListener("pointermove", e => {
      if (!activePointers.has(e.pointerId)) return;
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (activePointers.size === 1) {
        offsetX += (e.clientX - lastDragX) / 3;
        offsetY += (e.clientY - lastDragY) / 3;
        lastDragX = e.clientX; lastDragY = e.clientY;
      } else if (activePointers.size === 2) updatePinchZoom();
    });

    function endPointer(e) {
      activePointers.delete(e.pointerId);
      if (activePointers.size < 2) lastPinchDistance = 0;
      if (activePointers.size === 1) {
        const remaining = activePointers.values().next().value;
        lastDragX = remaining.x; lastDragY = remaining.y;
      }
    }

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    canvas.addEventListener("pointerleave", e => { if (e.pointerType === "mouse") endPointer(e); });

    const music = document.getElementById("bg-music");
    const musicStartSeconds = 0;

    function tryAutoPlay() {
      music.currentTime = musicStartSeconds;
      music.play().catch(() => {});
    }

    window.addEventListener("load", tryAutoPlay);

    function startOnInteraction() {
      if (music.paused) {
        music.currentTime = musicStartSeconds;
        music.play().catch(() => {});
      }
      document.body.removeEventListener("click", startOnInteraction);
      document.body.removeEventListener("touchstart", startOnInteraction);
    }

    document.body.addEventListener("click", startOnInteraction, { once: true });
    document.body.addEventListener("touchstart", startOnInteraction, { once: true });

    music.addEventListener("loadedmetadata", () => {
      music.currentTime = musicStartSeconds;
    });
  </script>
</body>
</html>
